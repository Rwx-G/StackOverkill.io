services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: stackoverkill-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Empty = uses relative URLs, calls go through frontend proxy
      - NEXT_PUBLIC_API_URL=
      # Backend URL for server-side proxy
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - stackoverkill-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: stackoverkill-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - DATA_DIR=/app/data
    volumes:
      # Persistent data: leaderboard + OG images
      - leaderboard-data:/app/data
    networks:
      - stackoverkill-network

networks:
  stackoverkill-network:
    driver: bridge

volumes:
  leaderboard-data:
    driver: local
